version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: talent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-talent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-talent}
      POSTGRES_DB: ${POSTGRES_DB:-talent}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-talent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: talent-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      AI_PORT: 8000

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talent-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-4100}
      DATABASE_URL: ${DATABASE_URL:-postgresql://talent:talent@db:5432/talent?schema=public}
      JWT_SECRET: ${JWT_SECRET:-segredo-dev}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-segredo-refresh-dev}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      UPLOAD_DIR: /app/uploads
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-32bytes-precisa-ter-32-bytes!!!!}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5176}
      AI_SERVICE_URL: http://ai:8000
    ports:
      - "4100:4100"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talent-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4100/api}
    ports:
      - "5176:5176"

volumes:
  db_data:
  backend_uploads:
